<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">

  <!-- Dark background square -->
  <rect width="32" height="32" fill="#080b10"/>

  <!-- Pediment triangle (white) -->
  <polygon
    points="16,4 29,24 3,24"
    stroke="#f0ece4"
    stroke-width="2"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Inner pediment line -->
  <line x1="6" y1="24" x2="16" y2="8" stroke="#f0ece4" stroke-width="1" opacity="0.5"/>
  <line x1="26" y1="24" x2="16" y2="8" stroke="#f0ece4" stroke-width="1" opacity="0.5"/>

  <!-- Base platform lines -->
  <line x1="2"  y1="24" x2="30" y2="24" stroke="#f0ece4" stroke-width="2"/>
  <line x1="1"  y1="27" x2="31" y2="27" stroke="#f0ece4" stroke-width="1.5"/>

  <!-- Amber circuit apex node -->
  <circle cx="16" cy="4" r="3" fill="#e8a020"/>

  <!-- Amber branch left -->
  <line x1="16" y1="12" x2="10" y2="12" stroke="#e8a020" stroke-width="1.2"/>
  <line x1="10" y1="12" x2="10" y2="17" stroke="#e8a020" stroke-width="1.2"/>
  <circle cx="10" cy="17" r="1.5" fill="#e8a020"/>

  <!-- Amber branch right -->
  <line x1="16" y1="12" x2="22" y2="12" stroke="#e8a020" stroke-width="1.2"/>
  <line x1="22" y1="12" x2="22" y2="17" stroke="#e8a020" stroke-width="1.2"/>
  <circle cx="22" cy="17" r="1.5" fill="#e8a020"/>

  <!-- Amber trunk node -->
  <circle cx="16" cy="12" r="1.5" fill="#e8a020"/>

  <!-- Amber vertical trunk -->
  <line x1="16" y1="7" x2="16" y2="22" stroke="#e8a020" stroke-width="1.2" stroke-dasharray="2,2"/>

</svg>
